<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bind</title>
</head>
<body>
    <button>Button Clicked</button>
</body>
<script>
    class React{
           constructor(){
            this.library = "React"
            this.server = 'https://localhost:3333'

            // requirement 
            // when load the page create a object and get the button reference & after click get response
                
            document
            .querySelector('button')
            .addEventListener('click', this.handClick.bind(this)) 
             
           }
           handClick(){
             console.log('Button Clicked');
             console.log(this);      
             console.log(this.server);
                         
           } 
    }
    const app = new React()
</script>
</html>
