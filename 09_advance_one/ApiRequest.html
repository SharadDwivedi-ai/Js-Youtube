<body style="background-color: darkgray; text-align: center;" onload="bodyLoad()" >
    <div class="card" style="align-items: center; background-color: black; color: white; padding: 20px;">
        <div class="card-header"></div>
        <div class="card-body"></div>
        <div class="card-footer"></div>

</body>

    // Assignment get the data from API 
    function bodyLoad() {
        const reqUrl = "https://api.github.com/users/hiteshchoudhary"
        const xhr = new XMLHttpRequest()
        xhr.open('GET', reqUrl)
        xhr.onload = function () {
            const data = JSON.parse(xhr.responseText)

            const img = document.createElement('img')
            img.src = data.avatar_url

            const h1 = document.createElement('h1')
            h1.innerHTML = (`Name: ${data.name}`)

            const p = document.createElement('p')
            p.innerHTML = `Followers : ${data.followers}`
        
            document.querySelector('.card-header').appendChild(h1)
            document.querySelector('.card-body').appendChild(img)
            document.querySelector('.card-footer').appendChild(p)

        }
        xhr.send()
    }
</script>

</html>
