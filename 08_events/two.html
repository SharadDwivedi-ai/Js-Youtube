<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Loop</title>
</head>
<body>
    <h1>Yashu and Code</h1>
    <button id="stop">Stop</button>
</body>
<script>
    // setTimeout(() => {                   // 1st writing approach
    //     console.log('Hello! Sharad');   
    // }, 2000);
    const saySharad = function(){console.log('Hello! Sharad');} //2nd writing approach
    setTimeout(saySharad, 2000)
    const changeText = function(){document.querySelector('h1').innerHTML = "Continue learning programming"}
    // setTimeout(changeText, 4000)
    
    const stopChange= setTimeout(changeText, 4000) 
    document.querySelector('#stop').addEventListener('click', function(){
        clearTimeout(stopChange)
        console.log("Stop Changes");
    })
</script>
</html>
